# =============================================================
# prj.conf — Zephyr 4.4 HTTP TCP Client + Blinky
# Board : heltec_wifi_lora32_v3/esp32s3/procpu
#
# Symboles supprimés car inexistants dans Zephyr 4.4 :
#   CONFIG_ESP32_WIFI           → le Wi-Fi ESP32 est activé via CONFIG_WIFI=y
#   CONFIG_WIFI_SSID            → défini dans main.c (#define WIFI_SSID)
#   CONFIG_NET_SOCKETS_POSIX_NAMES → activé automatiquement avec NET_SOCKETS
#   CONFIG_SERVER_IP/PORT       → définis dans main.c (#define SERVER_IP)
#   CONFIG_NET_TCP_MAX_SEND/RECV_WINDOW_SIZE → noms incorrects Zephyr 4.4
# =============================================================


# -------------------------------------------------------------
# Wi-Fi
# Sur Zephyr 4.4 pour ESP32-S3, CONFIG_WIFI=y suffit.
# Le driver Wi-Fi ESP32 est sélectionné automatiquement
# par le board heltec_wifi_lora32_v3.
# -------------------------------------------------------------
CONFIG_WIFI=y
CONFIG_WIFI_NM=y


# -------------------------------------------------------------
# RÉSEAU
# -------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# API BSD Sockets (zsock_socket, zsock_connect, zsock_send, zsock_recv)
CONFIG_NET_SOCKETS=y

# DHCP client : obtenir une IP depuis le hotspot téléphone
CONFIG_NET_DHCPV4=y

# Couche Ethernet L2 (utilisée par le driver Wi-Fi ESP32)
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y

# Gestionnaire d'événements réseau (net_mgmt callbacks)
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=5
CONFIG_NET_MGMT_EVENT_INFO=y

# Buffers réseau
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_DATA_SIZE=256


# -------------------------------------------------------------
# GPIO (LED blinky)
# -------------------------------------------------------------
CONFIG_GPIO=y


# -------------------------------------------------------------
# MÉMOIRE
# -------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048


# -------------------------------------------------------------
# CONSOLE SÉRIE (logs via USB UART du Heltec)
# -------------------------------------------------------------
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096